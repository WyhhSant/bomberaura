<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomberman Definitivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
    #game-wrapper { position: relative; }
    canvas { display: block; border: 4px solid #e94560; border-radius: 12px; }
    .overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 280px;
    }
    .overlay button {
      padding: 0.8rem 1.5rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e94560;
      color: white;
      font-weight: bold;
    }
    .overlay button:hover { background: #ff6b81; }
    .hud {
      position: absolute;
      top: 10px; left: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      gap: 20px;
      z-index: 5;
    }
    #timer {
      position: absolute;
      top: 10px; right: 10px;
      color: #fdcb6e;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 5;
    }
    #instructions {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      z-index: 5;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="menu" class="overlay">
    <h2>💣 BOMBERMAN</h2>
    <button id="btn-multi">⚔️ 2 Jogadores</button>
    <button id="btn-bot">🤖 vs Bot</button>
  </div>
  <div id="gameover" class="overlay" style="display:none;">
    <h2 id="winner"></h2>
    <button id="btn-restart">Menu</button>
  </div>
  <div id="hud" class="hud">
    <span style="color:#00b894;">P1: 💣<span id="p1bombs">1</span> 🔥<span id="p1range">1</span></span>
    <span style="color:#0984e3;">P2: 💣<span id="p2bombs">1</span> 🔥<span id="p2range">1</span></span>
  </div>
  <div id="timer">⏱️ <span id="timerValue">120</span>s</div>
  <div id="instructions"></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const COLS = 17, ROWS = 13, CELL = 36;
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  const EMPTY = 0, WALL = 1, BRICK = 2;

  // UI elements
  const menuDiv = document.getElementById('menu');
  const gameoverDiv = document.getElementById('gameover');
  const winnerSpan = document.getElementById('winner');
  const hudDiv = document.getElementById('hud');
  const timerDiv = document.getElementById('timer');
  const timerValueSpan = document.getElementById('timerValue');
  const instructionsDiv = document.getElementById('instructions');

  let grid, players, bombs, explosions, powerUps, particles;
  let gameRunning = false;
  let gameMode = null;
  let deathTimer = 120 * 60; // frames (120 segundos a 60fps)
  let keys = {};

  class Player {
    constructor(id, x, y, color, controls) {
      this.id = id;
      this.x = x; this.y = y;
      this.color = color;
      this.controls = controls || {};
      this.alive = true;
      this.maxBombs = 1;
      this.bombsPlaced = 0;
      this.range = 1;
      this.invincible = 60;
      this.cooldown = 0;
      this.isBot = false;
      this.botTimer = 0;
    }
  }

  class Bomb {
    constructor(x, y, owner, range) {
      this.x = x; this.y = y;
      this.owner = owner;
      this.range = range;
      this.timer = 150;
    }
  }

  function initGrid() {
    grid = Array(ROWS).fill().map(() => Array(COLS).fill(EMPTY));
    // Paredes fixas (xadrez)
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (r % 2 === 0 && c % 2 === 0) grid[r][c] = WALL;
    // Bordas
    for (let c = 0; c < COLS; c++) { grid[0][c] = WALL; grid[ROWS-1][c] = WALL; }
    for (let r = 0; r < ROWS; r++) { grid[r][0] = WALL; grid[r][COLS-1] = WALL; }
    // Blocos quebráveis
    const safe = [[1,1],[1,2],[2,1],[COLS-2,ROWS-2],[COLS-3,ROWS-2],[COLS-2,ROWS-3]];
    for (let r = 1; r < ROWS-1; r++) {
      for (let c = 1; c < COLS-1; c++) {
        if (grid[r][c] === EMPTY && !safe.some(s => s[0]===c && s[1]===r) && Math.random() < 0.5) {
          grid[r][c] = BRICK;
        }
      }
    }
  }

  function resetGame(mode) {
    gameMode = mode;
    initGrid();
    players = [];
    bombs = [];
    explosions = [];
    powerUps = [];
    particles = [];
    keys = {};
    deathTimer = 120 * 60;
    gameRunning = true;

    const p1 = new Player(1, 1, 1, '#00b894', { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', bomb: 'Space' });
    players.push(p1);

    if (mode === 'multi') {
      const p2 = new Player(2, COLS-2, ROWS-2, '#0984e3', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', bomb: 'Enter' });
      players.push(p2);
      instructionsDiv.textContent = 'P1: WASD + Espaço | P2: Setas + Enter';
    } else {
      const bot = new Player(2, COLS-2, ROWS-2, '#0984e3', {});
      bot.isBot = true;
      players.push(bot);
      instructionsDiv.textContent = 'P1: WASD + Espaço | Bot: IA';
    }

    menuDiv.style.display = 'none';
    gameoverDiv.style.display = 'none';
    hudDiv.style.display = 'flex';
    timerDiv.style.display = 'block';
    updateHUD();
  }

  function isBlocked(x, y, excludePlayer = null) {
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
    if (grid[y][x] !== EMPTY) return true;
    if (bombs.some(b => b.x === x && b.y === y)) return true;
    if (players.some(p => p !== excludePlayer && p.alive && p.x === x && p.y === y)) return true;
    return false;
  }

  function placeBomb(p) {
    if (!p.alive || p.bombsPlaced >= p.maxBombs) return;
    if (bombs.some(b => b.x === p.x && b.y === p.y)) return;
    bombs.push(new Bomb(p.x, p.y, p, p.range));
    p.bombsPlaced++;
  }

  function explode(bomb) {
    const {x, y, range, owner} = bomb;
    const addExpl = (px, py) => {
      if (!explosions.some(e => e.x===px && e.y===py)) {
        explosions.push({x: px, y: py, timer: 20});
        for (let i=0; i<5; i++) particles.push({x: px*CELL+CELL/2, y: py*CELL+CELL/2, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3-1, life: 15, color: '255,120,0'});
      }
    };
    addExpl(x, y);
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    dirs.forEach(([dx,dy]) => {
      for (let i=1; i<=range; i++) {
        const nx = x+dx*i, ny = y+dy*i;
        if (nx<0||nx>=COLS||ny<0||ny>=ROWS) break;
        if (grid[ny][nx] === WALL) break;
        if (grid[ny][nx] === BRICK) {
          grid[ny][nx] = EMPTY;
          for (let j=0; j<8; j++) particles.push({x: nx*CELL+CELL/2, y: ny*CELL+CELL/2, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5-2, life: 20, color: '180,140,120'});
          if (Math.random() < 0.3) powerUps.push({x: nx, y: ny, type: Math.random()<0.5?'bomb':'range'});
          addExpl(nx, ny);
          break;
        }
        addExpl(nx, ny);
      }
    });
    bombs = bombs.filter(b => b !== bomb);
    if (owner) owner.bombsPlaced = Math.max(0, owner.bombsPlaced-1);
  }

  function updateBot(bot) {
    if (!bot.alive || !gameRunning) return;
    bot.botTimer--;
    if (bot.botTimer > 0) return;
    bot.botTimer = 8;
    const danger = explosions.some(e => e.x===bot.x && e.y===bot.y) || bombs.some(b => {
      const dx = Math.abs(b.x-bot.x), dy = Math.abs(b.y-bot.y);
      return (dx===0 && dy<=b.range) || (dy===0 && dx<=b.range);
    });
    if (danger) {
      const moves = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => !isBlocked(bot.x+dx, bot.y+dy, bot));
      if (moves.length) { const m = moves[Math.floor(Math.random()*moves.length)]; bot.x += m[0]; bot.y += m[1]; }
    } else {
      if (Math.random()<0.1 && bot.bombsPlaced < bot.maxBombs) placeBomb(bot);
      else {
        const moves = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => !isBlocked(bot.x+dx, bot.y+dy, bot));
        if (moves.length) { const m = moves[Math.floor(Math.random()*moves.length)]; bot.x += m[0]; bot.y += m[1]; }
      }
    }
  }

  function update() {
    if (!gameRunning) return;
    deathTimer--;
    if (deathTimer < 0) {
      const stage = Math.floor((-deathTimer) / 180);
      const side = stage % 4, depth = Math.floor(stage/4);
      if (depth < 4) {
        for (let i=0; i<COLS; i++) {
          if (side===0 && 1+depth<ROWS-1) grid[1+depth][i] = WALL;
          if (side===2 && ROWS-2-depth>0) grid[ROWS-2-depth][i] = WALL;
        }
        for (let i=0; i<ROWS; i++) {
          if (side===1 && COLS-2-depth>0) grid[i][COLS-2-depth] = WALL;
          if (side===3 && 1+depth<COLS-1) grid[i][1+depth] = WALL;
        }
      }
    }

    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });

    for (let i=bombs.length-1; i>=0; i--) {
      bombs[i].timer--;
      if (bombs[i].timer <= 0) explode(bombs[i]);
    }
    for (let i=explosions.length-1; i>=0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i,1);
    }

    players.forEach(p => {
      if (!p.alive) return;
      if (p.invincible > 0) p.invincible--;
      if (p.cooldown > 0) p.cooldown--;
      if (p.isBot) updateBot(p);
      else {
        if (p.cooldown <= 0) {
          let dx=0, dy=0;
          if (keys[p.controls.up]) dy = -1;
          else if (keys[p.controls.down]) dy = 1;
          else if (keys[p.controls.left]) dx = -1;
          else if (keys[p.controls.right]) dx = 1;
          if (dx || dy) {
            const nx = p.x+dx, ny = p.y+dy;
            if (!isBlocked(nx, ny, p)) {
              p.x = nx; p.y = ny;
              const puIdx = powerUps.findIndex(pu => pu.x===p.x && pu.y===p.y);
              if (puIdx !== -1) {
                const pu = powerUps[puIdx];
                if (pu.type === 'bomb') p.maxBombs++;
                else if (pu.type === 'range') p.range++;
                powerUps.splice(puIdx, 1);
              }
            }
            p.cooldown = 6;
          }
        }
      }
      if (p.invincible <= 0 && explosions.some(e => e.x===p.x && e.y===p.y)) {
        p.alive = false;
        for (let i=0; i<12; i++) particles.push({x: p.x*CELL+CELL/2, y: p.y*CELL+CELL/2, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-3, life: 25, color: '255,50,50'});
      }
    });

    const alive = players.filter(p => p.alive);
    if (alive.length === 0) endGame('Empate!');
    else if (alive.length === 1 && players.length>=2) endGame(`Jogador ${alive[0].id} venceu!`);
    updateHUD();
  }

  function updateHUD() {
    const t = Math.max(0, Math.ceil(deathTimer/60));
    timerValueSpan.textContent = t;
    if (players[0]) {
      document.getElementById('p1bombs').textContent = players[0].maxBombs - players[0].bombsPlaced;
      document.getElementById('p1range').textContent = players[0].range;
    }
    if (players[1]) {
      document.getElementById('p2bombs').textContent = players[1].maxBombs - players[1].bombsPlaced;
      document.getElementById('p2range').textContent = players[1].range;
    }
  }

  function endGame(msg) {
    gameRunning = false;
    winnerSpan.textContent = msg;
    gameoverDiv.style.display = 'flex';
  }

  function draw() {
    ctx.fillStyle = '#1e272e';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const x = c*CELL, y = r*CELL;
        if (grid[r][c] === WALL) {
          ctx.fillStyle = '#485460'; ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        } else if (grid[r][c] === BRICK) {
          ctx.fillStyle = '#d2dae2'; ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
        }
      }
    }
    powerUps.forEach(pu => {
      const cx = pu.x*CELL+CELL/2, cy = pu.y*CELL+CELL/2;
      ctx.fillStyle = pu.type==='bomb'?'#fdcb6e':'#ff7675';
      ctx.beginPath(); ctx.arc(cx,cy,CELL/3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText(pu.type==='bomb'?'B':'R', cx, cy+4);
    });
    bombs.forEach(b => {
      const cx = b.x*CELL+CELL/2, cy = b.y*CELL+CELL/2;
      ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.arc(cx,cy,CELL/3,0,Math.PI*2); ctx.fill();
      if (b.timer<90 && Math.floor(b.timer/15)%2===0) { ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.beginPath(); ctx.arc(cx,cy,CELL/2.5,0,Math.PI*2); ctx.fill(); }
    });
    explosions.forEach(e => {
      ctx.fillStyle = `rgba(255,120,0,${e.timer/20})`;
      ctx.fillRect(e.x*CELL, e.y*CELL, CELL, CELL);
    });
    particles.forEach(p => {
      ctx.fillStyle = `rgba(${p.color},${p.life/25})`;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    });
    players.forEach(p => {
      if (!p.alive) return;
      const cx = p.x*CELL+CELL/2, cy = p.y*CELL+CELL/2;
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(cx, cy, CELL/3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-4,cy-3,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+4,cy-3,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-4,cy-3,2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(cx+4,cy-3,2,0,Math.PI*2); ctx.fill();
    });
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code.startsWith('Arrow') || e.code === 'Space' || e.code === 'Enter') e.preventDefault();
    if (gameRunning) players.forEach(p => { if (!p.isBot && e.code === p.controls.bomb) placeBomb(p); });
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  document.getElementById('btn-multi').addEventListener('click', () => resetGame('multi'));
  document.getElementById('btn-bot').addEventListener('click', () => resetGame('bot'));
  document.getElementById('btn-restart').addEventListener('click', () => {
    gameRunning = false;
    gameoverDiv.style.display = 'none';
    menuDiv.style.display = 'flex';
    hudDiv.style.display = 'none';
    timerDiv.style.display = 'none';
  });

  gameLoop();
})();
</script>
</body>
</html>
